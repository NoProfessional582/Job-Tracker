<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
  <defs>
    <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0078d4" />
      <stop offset="50%" stop-color="#6366f1" />
      <stop offset="100%" stop-color="#a855f7" />
    </linearGradient>
  </defs>
  
  <!-- Outer glowing background for favicon clarity -->
  <rect width="100" height="100" rx="22" fill="url(#logoGrad)" />
  
  <!-- Briefcase (Job) -->
  <rect x="24" y="36" width="52" height="38" rx="8" fill="#ffffff" />
  <!-- Handle -->
  <path d="M40 36V30c0-2.2 1.8-4 4-4h12c2.2 0 4 1.8 4 4v6" fill="none" stroke="#ffffff" stroke-width="4.5" stroke-linecap="round" />
  <!-- Inner divider line -->
  <line x1="24" y1="50" x2="76" y2="50" stroke="#f1f5f9" stroke-width="3" />
  <!-- Latch -->
  <rect x="45" y="46" width="10" height="8" rx="2" fill="#6366f1" />

  <!-- Magnifying Glass overlay (recruitment/job search) -->
  <circle cx="68" cy="68" r="15" fill="#ffffff" stroke="#0f172a" stroke-width="3.5" />
  <circle cx="68" cy="68" r="10" fill="#e0e7ff" />
  <!-- Glass reflection -->
  <path d="M64 62a6 6 0 0 1 6 0" fill="none" stroke="#ffffff" stroke-width="1.5" stroke-linecap="round" />
  <!-- Handle -->
  <line x1="78.5" y1="78.5" x2="88" y2="88" stroke="#0f172a" stroke-width="4.5" stroke-linecap="round" />
  <line x1="78.5" y1="78.5" x2="88" y2="88" stroke="#ffffff" stroke-width="1.5" stroke-linecap="round" />
</svg>
